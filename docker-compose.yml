services:
  postgres:
    image: postgres:16-alpine
    container_name: heritage-hub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: heritage
      POSTGRES_PASSWORD: heritage
      POSTGRES_DB: heritage_hub
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U heritage -d heritage_hub']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: heritage-hub-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
